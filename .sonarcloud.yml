# SonarCloud Configuration for OUTE Project
# Enforces strict code quality and security standards

sonar:
  projectKey: oute-main
  projectName: OUTE Main Project

# Scanning configuration
env:
  SONAR_TOKEN: ${SONAR_TOKEN}

# Code coverage configuration
coverage:
  exclusions:
    - '**/node_modules/**'
    - '**/dist/**'
    - '**/build/**'
    - '**/*.test.ts'
    - '**/*.spec.ts'
    - '**/index.ts'

# JavaScript/TypeScript analysis
javascript:
  file.suffixes: .js,.ts,.tsx,.jsx,.vue,.svelte

# Exclude patterns
exclusions:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/.storybook/**'

# Source and test directories
sources:
  - packages
  - shared

tests:
  - '**/*.test.ts'
  - '**/*.spec.ts'

# Quality gate configuration (enforced on PRs)
qualitygate:
  # Overall rating must be A- or better
  - key: rating
    operator: GREATER_THAN_OR_EQUALS
    value: A

  # Security-specific gates
  - key: security_rating
    operator: EQUALS
    value: A

  - key: security_hotspots_reviewed
    operator: GREATER_THAN_OR_EQUALS
    value: 100

  # Code quality gates
  - key: reliability_rating
    operator: EQUALS
    value: A

  - key: maintainability_rating
    operator: EQUALS
    value: A

  # Coverage requirements
  - key: coverage
    operator: GREATER_THAN_OR_EQUALS
    value: 80

  # Code duplication limits
  - key: duplicated_lines_density
    operator: LESS_THAN
    value: 3

  # Blocker code smells should not exist
  - key: blocker_violations
    operator: EQUALS
    value: 0

  # No critical vulnerabilities
  - key: vulnerabilities
    operator: EQUALS
    value: 0

# Additional quality metrics
metrics:
  # Security metrics
  - vulnerabilities
  - security_rating
  - security_hotspots_reviewed
  - security_hotspots

  # Code quality metrics
  - reliability_rating
  - maintainability_rating
  - bugs
  - code_smells
  - critical_violations
  - blocker_violations

  # Coverage metrics
  - coverage
  - line_coverage
  - branch_coverage

  # Duplication metrics
  - duplicated_lines
  - duplicated_lines_density

  # Complexity metrics
  - cyclomatic_complexity
  - cognitive_complexity

# Custom rules for TypeScript
rules:
  # Enforce type safety
  - key: typescript-no-explicit-any
    severity: CRITICAL

  # Prevent security issues
  - key: typescript-no-hardcoded-password
    severity: BLOCKER

  - key: typescript-no-eval
    severity: BLOCKER

  # Code quality
  - key: typescript-no-unused-vars
    severity: MAJOR

# PR decoration settings (requires GitHub token)
pullRequest:
  enabled: true
  analysisMode: pull_request
