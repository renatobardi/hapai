name: Merge to Develop - Build & Deploy Preview

on:
  push:
    branches: [develop]

jobs:
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Build all packages
        run: npm run build

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        package:
          - { name: design-system, port: 6006 }
          - { name: 00_dashboard, port: 3000 }
          - { name: 01_auth-profile, port: 3001 }
          - { name: 02_projects, port: 3002 }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/${{ matrix.package.name }}
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/hapai-${{ matrix.package.name }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/hapai-${{ matrix.package.name }}:develop-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-preview:
    name: Deploy to Preview
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (preview)
        run: |
          for SERVICE in hapai-dashboard hapai-auth-profile hapai-projects; do
            gcloud run deploy ${SERVICE}-preview \
              --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/${SERVICE}:${{ github.sha }} \
              --platform=managed \
              --region=${{ secrets.GCP_REGION }} \
              --allow-unauthenticated \
              || echo "Service $SERVICE already exists, updating..."
          done

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: success()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Develop branch deployed to preview ✅'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
