name: Security Scan

on:
  push:
    branches: [main, staging, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with git-secrets
        run: |
          brew install git-secrets || apt-get install -y git-secrets
          git secrets --register-aws
          git secrets --scan || exit 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  dependency-vulnerabilities:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=moderate || exit 0

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - design-system
          - 00_dashboard
          - 01_auth-profile
          - 02_projects
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/${{ matrix.package }}
          push: false
          load: true
          tags: oute-${{ matrix.package }}:test

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: oute-${{ matrix.package }}:test
          format: 'sarif'
          output: 'trivy-container-${{ matrix.package }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-container-${{ matrix.package }}.sarif'
          category: 'trivy-container-${{ matrix.package }}'

  sast-sonarqube:
    name: SAST - SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: SonarQube analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=oute
            -Dsonar.organization=seu-org
            -Dsonar.sources=packages,shared
            -Dsonar.exclusions=**/node_modules/**,**/*.test.ts
            -Dsonar.securityScan=true

  notify:
    name: Notify Security Scan Results
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-vulnerabilities, sast-sonarqube]
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Security scan completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
