name: Auto Deploy on Main Branch Push (Production)

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE_NAME: oute-dashboard

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build dashboard
        run: npm run build -w oute-dashboard

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: packages/00_dashboard/dist
          retention-days: 1

  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
      deployments: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build Docker image
        run: |
          docker build \
            --file packages/00_dashboard/Dockerfile \
            --tag ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.IMAGE_NAME }}:v${{ github.run_number }} \
            --tag ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.IMAGE_NAME }}:v${{ github.run_number }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.IMAGE_NAME }}:${{ github.sha }}
          echo "✅ All images pushed successfully"

      - name: Deploy to Cloud Run (Production)
        id: deploy
        run: |
          SERVICE_NAME="oute-dashboard"
          IMAGE_URL="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.IMAGE_NAME }}:latest"

          echo "🚀 Deploying to Cloud Run (production)..."

          gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE_URL" \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --service-account=cloud-run-sa@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --memory=512Mi \
            --cpu=1 \
            --timeout=3600 \
            --port=3000 \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest" \
            --quiet

          # Get service URL
          URL=$(gcloud run services describe "$SERVICE_NAME" \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')

          echo "service_url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

      - name: Health check (production)
        run: |
          URL="${{ steps.deploy.outputs.service_url }}"
          echo "Running health checks on production..."
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [[ "$HTTP_CODE" =~ ^(200|404)$ ]]; then
              echo "✅ Production service is responding (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Waiting... attempt $i/30 (HTTP $HTTP_CODE)"
            sleep 2
          done
          echo "❌ Health check failed"
          exit 1

      - name: Get previous revision for rollback
        id: previous-revision
        run: |
          PREVIOUS=$(gcloud run revisions list \
            --service=oute-dashboard \
            --region=${{ env.GCP_REGION }} \
            --limit=2 \
            --format='value(name)' | tail -1)
          echo "revision=$PREVIOUS" >> $GITHUB_OUTPUT
          echo "Previous revision: $PREVIOUS"

      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          auto_merge: false
          description: 'Production deployment of OUTE Dashboard v${{ github.run_number }}'

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          state: 'success'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment-url: ${{ steps.deploy.outputs.service_url }}
          description: 'Successfully deployed to production'

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          state: 'failure'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          description: 'Production deployment failed'

      - name: Create release
        if: success()
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Production Deployment v${{ github.run_number }}

            **Service:** OUTE Dashboard
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            **Image Tags:**
            - latest
            - v${{ github.run_number }}
            - ${{ github.sha }}

            ### Service URL
            ${{ steps.deploy.outputs.service_url }}

            ### View Logs
            ```bash
            gcloud run logs read oute-dashboard --region=${{ env.GCP_REGION }} --follow
            ```

            ### Rollback Command (if needed)
            ```bash
            gcloud run services update-traffic oute-dashboard \
              --region=${{ env.GCP_REGION }} \
              --to-revisions=${{ steps.previous-revision.outputs.revision }}=100
            ```
          draft: false

      - name: Create deployment summary
        if: always()
        run: |
          cat > $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🚀 Production Deployment Complete

          **Service:** `oute-dashboard`
          **Version:** `v${{ github.run_number }}`
          **Branch:** `${{ github.ref }}`
          **Commit:** `${{ github.sha }}`
          **Author:** `${{ github.actor }}`

          ### Deployment Details
          - **Environment:** production
          - **Region:** ${{ env.GCP_REGION }}
          - **Image Tags:**
            - latest
            - v${{ github.run_number }}
            - ${{ github.sha }}
          - **Service URL:** ${{ steps.deploy.outputs.service_url }}
          - **Previous Revision:** ${{ steps.previous-revision.outputs.revision }}

          ### View Logs
          ```bash
          gcloud run logs read oute-dashboard --region=${{ env.GCP_REGION }} --follow
          ```

          ### View Service
          ```bash
          gcloud run services describe oute-dashboard --region=${{ env.GCP_REGION }}
          ```

          ### View All Revisions
          ```bash
          gcloud run revisions list --service=oute-dashboard --region=${{ env.GCP_REGION }}
          ```

          ### Rollback to Previous (if needed)
          ```bash
          gcloud run services update-traffic oute-dashboard \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=${{ steps.previous-revision.outputs.revision }}=100
          ```

          ### Canary Deployment (5% new, 95% old)
          ```bash
          gcloud run services update-traffic oute-dashboard \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=<NEW_REVISION>=5,<OLD_REVISION>=95
          ```
          EOF

      # Slack notifications commented out - action requires webhook URL setup
      # Uncomment and configure when SLACK_WEBHOOK secret is available
