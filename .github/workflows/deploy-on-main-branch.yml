      #         "text": "✅ Production Deployment Successful",
      #         "blocks": [
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": "✅ *Production Deployment Successful*\n*Service:* oute-dashboard v${{ github.run_number }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*URL:* ${{ steps.deploy.outputs.service_url }}"
      #             }
