name: Merge to Main - Deploy Production & Release

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Build all packages
        run: npm run build

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        package:
          - design-system
          - 00_dashboard
          - 01_auth-profile
          - 02_projects
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/${{ matrix.package }}
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/oute-${{ matrix.package }}:${{ github.sha }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/oute-${{ matrix.package }}:latest
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/oute-${{ matrix.package }}:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (production)
        env:
          SERVICES: "oute-dashboard oute-auth-profile oute-projects"
        run: |
          for SERVICE in $SERVICES; do
            echo "Deploying $SERVICE to production..."
            gcloud run deploy ${SERVICE} \
              --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/${SERVICE}:${{ github.sha }} \
              --platform=managed \
              --region=${{ secrets.GCP_REGION }} \
              --set-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ secrets.GCP_REGION }}:oute-postgres \
              --set-env-vars="NODE_ENV=production" \
              --set-secrets="DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest" \
              --memory=512Mi \
              --timeout=3600s \
              --service-account=cloud-run-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          done

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="v${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "## 🚀 Production Release: $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "### Deployed Services" >> release_notes.md
          echo "- oute-dashboard: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/oute-dashboard:${{ github.sha }}" >> release_notes.md
          echo "- oute-auth-profile: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/oute-auth-profile:${{ github.sha }}" >> release_notes.md
          echo "- oute-projects: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker-repo/oute-projects:${{ github.sha }}" >> release_notes.md

      - uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_notes.outputs.VERSION }}
          release_name: Release ${{ steps.release_notes.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false

  notify:
    name: Notify Production Deployment
    runs-on: ubuntu-latest
    needs: [deploy-production, create-release]
    if: success()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🚀 Production deployed successfully! Version: v${{ github.run_number }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
