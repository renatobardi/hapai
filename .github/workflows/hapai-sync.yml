name: hapai sync

on:
  schedule:
    # Daily at 2 AM UTC (adjust to your timezone)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  id-token: write  # Required for OIDC token

jobs:
  sync:
    name: Sync audit logs to GCP
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: 'projects/355730096821/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'hapai-sync@hapai-oute.iam.gserviceaccount.com'
          token_format: 'access_token'
          access_token_lifetime: '600s'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Download audit logs from GCS
        run: |
          mkdir -p /tmp/hapai-audit
          gsutil -m rsync -r gs://hapai-audit-bardi/ /tmp/hapai-audit/
          echo "Files downloaded:"
          find /tmp/hapai-audit -name "*.jsonl" | sort

      - name: Load into BigQuery
        run: |
          PROJECT="hapai-oute"
          BQ_TABLE="${PROJECT}:hapai_dataset.events"
          SCHEMA="infra/gcp/bigquery-schema.json"
          ERRORS=0
          while IFS= read -r -d '' file; do
            echo "Loading: $file"
            if bq load --project_id="$PROJECT" --source_format=NEWLINE_DELIMITED_JSON --schema="$SCHEMA" --ignore_unknown_values --noreplace "$BQ_TABLE" "$file"; then
              echo "OK: $file"
            else
              echo "WARN: $file failed (pode ser duplicata — continuando)"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find /tmp/hapai-audit -name "*.jsonl" -print0 | sort -z)
          echo "Done. Erros: $ERRORS"

      - name: Slack notification (optional)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ hapai sync failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Repository: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
