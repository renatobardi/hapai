name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'infra/gcp/dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy dashboard files
        run: |
          mkdir -p _site
          cp infra/gcp/dashboard/index.html _site/
          cp infra/gcp/dashboard/dashboard.js _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
