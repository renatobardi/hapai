name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'infra/gcp/dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/gcp/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: infra/gcp/dashboard
        run: npm ci

      - name: Build
        working-directory: infra/gcp/dashboard
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: hapai-oute.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: hapai-oute
          VITE_BQ_PROXY_URL: ${{ secrets.VITE_BQ_PROXY_URL }}
        run: |
          npm run build
          cp ../../../_site/index.html ../../../_site/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
