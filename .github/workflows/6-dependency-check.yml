name: Dependency & License Check

on:
  pull_request:
    paths: ['package*.json']
  schedule:
    # Check weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'OUTE'
          path: '.'
          format: 'SARIF'
          args: >
            --enableExperimental
            --enableRetired
            --suppression dependency-check-suppressions.xml

      - name: Upload Dependency Check results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'dependency-check-report.sarif'

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > audit-results.json || true
          cat audit-results.json

      - name: Comment PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));

            if (audit.vulnerabilities) {
              const critical = Object.values(audit.vulnerabilities).filter(v => v.severity === 'critical').length;
              const high = Object.values(audit.vulnerabilities).filter(v => v.severity === 'high').length;

              const comment = `## 📦 NPM Audit Results\n\n- **Critical**: ${critical}\n- **High**: ${high}\n\nRun \`npm audit\` locally for more details.`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Check licenses
        run: |
          license-checker \
            --production \
            --onlyAllow "MIT,Apache-2.0,BSD,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0" \
            --markdown > LICENSE_REPORT.md || echo "License check completed with warnings"

      - name: Upload license report
        uses: actions/upload-artifact@v3
        with:
          name: license-report
          path: LICENSE_REPORT.md

  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Approve and merge Dependabot PR
        run: |
          echo "Dependabot PR detected. Manual review recommended before merge."
          # Auto-merge only minor and patch updates
          if [[ "${{ github.event.pull_request.title }}" =~ (bump|chore.*dependencies) ]]; then
            echo "⚠️ Review and merge manually for security updates"
          fi

  notify:
    name: Notify Dependency Check
    runs-on: ubuntu-latest
    needs: [npm-audit, license-check]
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Dependency & license check completed'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
